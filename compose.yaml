services:
  mongo:
    image: mongo:7
    container_name: cargo-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGODB_DB}
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  be:
    build:
      context: ./be
      dockerfile: Dockerfile
    container_name: cargo-be
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      MONGODB_URI: ${MONGODB_URI}
      MONGODB_DB: ${MONGODB_DB}
      CORS_ORIGINS: ${CORS_ORIGINS}
      AI_API_BASE_URL: ${AI_API_BASE_URL}
      AI_API_TIMEOUT_SECONDS: ${AI_API_TIMEOUT_SECONDS}
    depends_on:
      mongo:
        condition: service_healthy

  fe:
    build:
      context: ./fe
      dockerfile: Dockerfile
    container_name: cargo-fe
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL}
      VITE_MAPTILER_API_KEY: ${VITE_MAPTILER_API_KEY}
      VITE_MAPTILER_MAP_ID: ${VITE_MAPTILER_MAP_ID}
    volumes:
      - ./fe:/app
      - /app/node_modules
    depends_on:
      - be

  vessel-analyzer:
    build:
      context: ./vessel_route_analyzer
      dockerfile: Dockerfile
    container_name: cargo-vessel-analyzer
    restart: unless-stopped
    ports:
      - "8001:8000"
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL_NAME: ${GEMINI_MODEL_NAME}
      CORS_ALLOW_ORIGINS: ${AI_CORS_ALLOW_ORIGINS}
    volumes:
      # 호스트의 Codex/Gemini 인증 세션을 컨테이너 내부 CLI 실행에 재사용
      # Codex CLI의 실제 인증/설정 홈은 ~/.config가 아니라 ~/.codex (CODEX_HOME) 이므로 반드시 이 경로를 마운트해야 함
      # codex exec는 세션/상태 DB에 쓰기가 필요해 읽기전용으로는 동작하지 않음 (:ro 제거)
      - ~/.codex:/root/.codex
      - ~/.config:/root/.config:ro
      - ~/.gemini:/root/.gemini:ro

volumes:
  mongo-data:
