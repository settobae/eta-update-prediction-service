services:
  postgres:
    image: 'postgres:16'
    environment:
      - POSTGRES_DB=cargo_tracker
      - POSTGRES_USER=myuser
      - POSTGRES_PASSWORD=secret
    ports:
      - '5432:5432'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myuser -d cargo_tracker"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./be
    ports:
      - '8080:8080'
    environment:
      - AISSTREAM_API_KEY=${AISSTREAM_API_KEY}
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/cargo_tracker
      - SPRING_DATASOURCE_USERNAME=myuser
      - SPRING_DATASOURCE_PASSWORD=secret
      - SPRING_DOCKER_COMPOSE_ENABLED=false
    depends_on:
      postgres:
        condition: service_healthy
