services:
  mongo:
    image: mongo:7
    container_name: cargo-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGODB_DB}
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  be:
    build:
      context: ./be
      dockerfile: Dockerfile
    container_name: cargo-be
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      MONGODB_URI: ${MONGODB_URI}
      MONGODB_DB: ${MONGODB_DB}
    depends_on:
      mongo:
        condition: service_healthy

  fe:
    build:
      context: ./fe
      dockerfile: Dockerfile
    container_name: cargo-fe
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ./fe:/app
      - /app/node_modules
    depends_on:
      - be

volumes:
  mongo-data:
