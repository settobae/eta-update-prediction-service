services:
  mongo:
    image: mongo:7
    container_name: cargo-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: root
      MONGO_INITDB_DATABASE: cargo_tracker
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  be:
    build:
      context: ./be
      dockerfile: Dockerfile
    container_name: cargo-be
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./be/.env
    environment:
      MONGODB_URI: mongodb://root:root@mongo:27017
    depends_on:
      mongo:
        condition: service_healthy

volumes:
  mongo-data:
